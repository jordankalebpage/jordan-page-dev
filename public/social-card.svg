<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1200"
  height="630"
  viewBox="0 0 1200 630"
  fill="none"
>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#09090b" />
      <stop offset="0.6" stop-color="#18181b" />
      <stop offset="1" stop-color="#1e1b4b" />
    </linearGradient>
    <radialGradient id="glow" cx="600" cy="0" r="800" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="rgba(129, 140, 248, 0.2)" />
      <stop offset="1" stop-color="transparent" />
    </radialGradient>
    <linearGradient id="text-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#a1a1aa" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#glow)" />

  <rect
    x="64"
    y="64"
    width="1072"
    height="502"
    rx="40"
    fill="rgba(24, 24, 27, 0.4)"
    stroke="rgba(129, 140, 248, 0.3)"
    stroke-width="2"
  />

  <text
    x="600"
    y="330"
    fill="url(#text-grad)"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="240"
    font-weight="800"
    letter-spacing="-0.04em"
    text-anchor="middle"
  >
    JP
  </text>

  <text
    x="600"
    y="480"
    fill="#818cf8"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="32"
    font-weight="600"
    letter-spacing="0.1em"
    text-anchor="middle"
  >
    jordanpage.dev
  </text>
</svg>
